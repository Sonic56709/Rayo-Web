<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rayo Web</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #07080F;
      --surface: #0E0F1C;
      --border:  #1E2035;
      --gold:    #F5C400;
      --cyan:    #00C8E0;
      --text:    #D8DAF0;
      --muted:   #5A5C7A;
      --radius:  12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(0,200,224,0.06) 1px, transparent 1px);
      background-size: 32px 32px;
      pointer-events: none;
      z-index: 0;
    }
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(130px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width:500px;height:500px;background:rgba(245,196,0,.07);top:-150px;left:-100px; }
    .blob-2 { width:600px;height:600px;background:rgba(0,200,224,.06);bottom:-200px;right:-150px; }

    .page {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 0 24px 80px;
    }
    header {
      padding: 64px 0 52px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      animation: fadeDown .7s cubic-bezier(.22,1,.36,1) both;
    }

    .logo-mark { width: 54px; height: 54px; }

    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: clamp(2.2rem, 7vw, 4rem);
      letter-spacing: .08em;
      background: linear-gradient(110deg, var(--gold) 30%, var(--cyan) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-rule {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      max-width: 340px;
    }
    .logo-rule .lr { flex:1; height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); }

    .welcome-tag {
      font-family: 'Orbitron', sans-serif;
      font-size: .68rem;
      letter-spacing: .35em;
      text-transform: uppercase;
      color: var(--muted);
      animation: fadeDown .7s .15s both;
    }

    /* --- NUEVOS ESTILOS BUSCADOR --- */
    .search-area {
      display: flex;
      justify-content: center;
      margin-bottom: 40px;
      animation: fadeUp .6s .2s both;
    }
    .search-input-wrapper {
      position: relative;
      width: 100%;
      max-width: 400px;
    }
    .search-input-wrapper input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 14px 20px 14px 45px;
      border-radius: 10px;
      color: var(--text);
      font-family: 'Orbitron', sans-serif;
      font-size: 0.75rem;
      outline: none;
      transition: border-color 0.3s;
    }
    .search-input-wrapper input:focus {
      border-color: var(--cyan);
    }
    .search-icon-svg {
      position: absolute;
      left: 15px;
      top: 50%;
      transform: translateY(-50%);
      opacity: 0.5;
    }
    #noResultsMessage {
      display: none;
      text-align: center;
      padding: 30px;
      color: var(--muted);
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
    }
    /* ------------------------------ */

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 36px;
      animation: fadeUp .6s .3s both;
    }
    .section-header .line { flex:1; height:1px; background:var(--border); }
    .section-header h2 {
      font-family: 'Orbitron', sans-serif;
      font-size: clamp(.72rem, 2vw, .88rem);
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--gold);
      white-space: nowrap;
    }
    .games-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 22px;
      justify-content: center;
    }

    .game-card {
      width: 268px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: transform .32s ease, border-color .32s ease, box-shadow .32s ease;
      animation: fadeUp .6s both;
    }
    .game-card:hover { transform: translateY(-7px); }
    .game-card.gold:hover  { border-color:var(--gold); box-shadow:0 12px 40px rgba(245,196,0,.16); }
    .game-card.cyan:hover  { border-color:var(--cyan); box-shadow:0 12px 40px rgba(0,200,224,.16); }

    .card-bar { height:3px; width:100%; }
    .card-bar.gold { background:linear-gradient(90deg,var(--gold),transparent); }
    .card-bar.cyan { background:linear-gradient(90deg,var(--cyan),transparent); }
    
    .card-img-wrap {
      width:100%; height:190px;
      overflow:hidden;
      background:#0b0c18;
      display:flex; align-items:center; justify-content:center;
      position:relative;
    }
    .card-img-wrap img {
      width:100%; height:100%;
      object-fit:cover;
      transition:transform .42s ease;
      display:block;
    }
    .game-card:hover .card-img-wrap img { transform:scale(1.06); }

    .img-fallback {
      display:none;
      flex-direction:column;
      align-items:center; justify-content:center;
      gap:12px;
      width:100%; height:100%;
      background:#0b0c18;
    }
    .card-body {
      padding:20px 20px 22px;
      display:flex;
      flex-direction:column;
      gap:10px;
      flex:1;
    }
    .card-name {
      font-family:'Orbitron',sans-serif;
      font-size:1rem;
      font-weight:600;
      letter-spacing:.06em;
      color:var(--text);
    }
    .card-patches { display:flex; gap:6px; flex-wrap:wrap; }
    .patch {
      display:inline-flex;
      align-items:center;
      gap:5px;
      padding:3px 9px;
      border-radius:4px;
      font-size:.63rem;
      font-weight:600;
      letter-spacing:.12em;
      text-transform:uppercase;
      border:1px solid;
    }
    .patch.gold  { border-color:rgba(245,196,0,.35); color:var(--gold); background:rgba(245,196,0,.07); }
    .patch.cyan  { border-color:rgba(0,200,224,.3);  color:var(--cyan); background:rgba(0,200,224,.07); }
    .patch.muted { border-color:var(--border); color:var(--muted); background:transparent; }
    
    .download-btn {
      display:flex;
      align-items:center;
      justify-content:center;
      gap:9px;
      margin-top:auto;
      padding:11px 18px;
      border-radius:8px;
      border:1.5px solid;
      text-decoration:none;
      font-family:'Orbitron',sans-serif;
      font-size:.67rem;
      font-weight:600;
      letter-spacing:.12em;
      text-transform:uppercase;
      transition:all .25s;
    }
    .download-btn.gold { border-color:var(--gold); color:var(--gold); }
    .download-btn.gold:hover { background:var(--gold); color:var(--bg); }
    .download-btn.cyan { border-color:var(--cyan); color:var(--cyan); }
    .download-btn.cyan:hover { background:var(--cyan); color:var(--bg); }

    footer {
      margin-top:60px;
      padding-top:24px;
      border-top:1px solid var(--border);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:12px;
    }
    footer span {
      font-family:'Orbitron',sans-serif;
      font-size:.62rem;
      letter-spacing:.2em;
      color:var(--muted);
      text-transform:uppercase;
    }

    @keyframes fadeDown { from { opacity:0; transform:translateY(-18px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeUp { from { opacity:0; transform:translateY(22px); } to { opacity:1; transform:translateY(0); } }

    @media (max-width:620px) { .game-card { width:90%; max-width:340px; } }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="page">
  <header>
    <svg class="logo-mark" viewBox="0 0 54 54" fill="none" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="lg1" x1="0" y1="0" x2="54" y2="54" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#F5C400"/>
          <stop offset="100%" stop-color="#00C8E0"/>
        </linearGradient>
      </defs>
      <polygon points="31,3 12,31 25,31 23,51 42,23 29,23" fill="url(#lg1)"/>
    </svg>
    <div class="logo-text">Rayo Web</div>
    <div class="logo-rule">
      <span class="lr"></span>
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <rect x="5" y=".7" width="6.1" height="6.1" rx=".8" transform="rotate(45 5 5)" fill="#12131E" stroke="#2A2B40" stroke-width="1.2"/>
      </svg>
      <span class="lr"></span>
    </div>
    <p class="welcome-tag">Bienvenido a la comunidad</p>
  </header>

  <div class="search-area">
    <div class="search-input-wrapper">
      <svg class="search-icon-svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
      <input type="text" id="mainSearch" placeholder="BUSCAR PROYECTO..." autocomplete="off">
    </div>
  </div>

  <div class="section-header">
    <div class="line"></div>
    <h2>Juegos de la Comunidad</h2>
    <div class="line"></div>
  </div>

  <div class="games-grid" id="gamesGrid">
    <div class="game-card gold">
      <div class="card-bar gold"></div>
      <div class="card-img-wrap">
        <img src="content://media/external/downloads/1000781385" alt="HyperCraft" onerror="this.style.display='none';this.parentElement.querySelector('.img-fallback').style.display='flex';">
        <div class="img-fallback"><span>HyperCraft</span></div>
      </div>
      <div class="card-body">
        <div class="card-name">HyperCraft</div>
        <div class="card-patches">
          <span class="patch gold">APK</span>
          <span class="patch muted">Aventura</span>
        </div>
        <a class="download-btn gold" href="https://www.mediafire.com/file/eyqlvv2j6l5agza/HyperCraft_signed.apk/file" target="_blank">Descargar APK</a>
      </div>
    </div>

    <div class="game-card cyan">
      <div class="card-bar cyan"></div>
      <div class="card-img-wrap">
        <img src="content://media/external/downloads/1000781364" alt="BalionCraft" onerror="this.style.display='none';this.parentElement.querySelector('.img-fallback').style.display='flex';">
        <div class="img-fallback"><span>BalionCraft</span></div>
      </div>
      <div class="card-body">
        <div class="card-name">BalionCraft</div>
        <div class="card-patches">
          <span class="patch cyan">Launcher</span>
          <span class="patch muted">Comunidad</span>
        </div>
        <a class="download-btn cyan" href="https://www.mediafire.com/folder/b5g5722h3gwry/BalionLauncher" target="_blank">Descargar apk</a>
      </div>
    </div>

    <div class="game-card gold"> 
      <div class="card-bar gold"></div>
      <div class="card-img-wrap">
        <img src="content://media/external/downloads/1000781421" alt="Md emu" onerror="this.style.display='none';this.parentElement.querySelector('.img-fallback').style.display='flex';">
        <div class="img-fallback"><span>Md emu</span></div>
      </div>
      <div class="card-body">
        <div class="card-name">Md emu</div>
        <div class="card-patches">
          <span class="patch gold">Emu</span>
          <span class="patch muted">Sega</span>
        </div>
        <a class="download-btn gold" href="https://www.mediafire.com/file/i3vzbdn1s2lubjt/MD.Emu_1.5.43.apk/file" target="_blank">Descargar apk</a>
      </div>
    </div>
  </div>

  <div id="noResultsMessage">PROYECTO NO ENCONTRADO</div>

  <footer>
    <span>Rayo Web &nbsp;&middot;&nbsp; Hecho por la comunidad</span>
  </footer>
</div>

<script>
  const searchInput = document.getElementById('mainSearch');
  const cards = document.querySelectorAll('.game-card');
  const noResults = document.getElementById('noResultsMessage');

  searchInput.addEventListener('input', () => {
    const term = searchInput.value.toLowerCase();
    let found = false;

    cards.forEach(card => {
      const name = card.querySelector('.card-name').textContent.toLowerCase();
      if (name.includes(term)) {
        card.style.display = 'flex';
        found = true;
      } else {
        card.style.display = 'none';
      }
    });

    noResults.style.display = found ? 'none' : 'block';
  });
</script>

</body>
</html>
